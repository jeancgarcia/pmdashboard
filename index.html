<script type="text/babel" data-type="module">

const Icon = {

  ),

/* ═══ Section color tints ═══ */
const TINT = {
  "Today\u2019s Schedule": "#f59e0b",
  "Action Items": "#3b82f6",
  "Emails Awaiting Reply": "#8b5cf6",
  "Teams Highlights": "#06b6d4",
  "Out of Office": "#9ca3af",
  "Monday Preview": "#10b981",
  "Next Day Preview": "#10b981",
  "Week Summary": "#3b82f6",
  "Key Decisions": "#f59e0b",
  "Wins": "#10b981",
  "Blockers & Risks": "#ef4444",
  "default": "#9ca3af",
};

/* ═══ CheckItem (interactive) ═══ */
function CheckItem({ item, done, onToggle }) {
  return (
    <div
      onClick={onToggle}
      className={`group flex items-start gap-3 py-3 px-1 cursor-pointer select-none transition-all border-b border-gray-100 last:border-0 ${done ? "opacity-40" : ""}`}
    >
      <div className={`mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-200 ${done ? "bg-emerald-500" : "border-2 border-gray-300 group-hover:border-gray-400"}`}>
        {done && <Icon.Check size={11} color="white" />}
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className={`text-sm leading-snug ${done ? "line-through text-gray-400" : "text-gray-900"}`}>{item.label}</span>
          {item.flag === "urgent" && !done && <span className="w-1.5 h-1.5 rounded-full bg-red-500 flex-shrink-0" />}
          {item.flag === "due" && !done && <span className="w-1.5 h-1.5 rounded-full bg-amber-500 flex-shrink-0" />}
        </div>
        {item.detail && !done && <p className="text-xs text-gray-400 leading-relaxed mt-1">{item.detail}</p>}
      </div>
    </div>
  );
}

/* ═══ InfoItem (non-interactive) ═══ */
function InfoItem({ item }) {
  return (
    <div className="flex items-start gap-3 py-3 px-1 border-b border-gray-50 last:border-0">
      {item.time ? (
        <span className="text-xs font-medium text-gray-400 tabular-nums w-16 flex-shrink-0 pt-0.5 text-right">{item.time}</span>
      ) : (
        <span className="w-1 h-1 rounded-full bg-gray-300 flex-shrink-0 mt-2 ml-1" />
      )}
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className="text-sm text-gray-900">{item.label}</span>
          {item.note && <span className="text-xs text-gray-300 font-medium">{item.note}</span>}
        </div>
        {item.detail && <p className="text-xs text-gray-400 leading-relaxed mt-0.5">{item.detail}</p>}
      </div>
    </div>
  );
}

/* ═══ Section ═══ */
function Section({ section, completed, onToggle, defaultCollapsed }) {
  const [collapsed, setCollapsed] = useState(defaultCollapsed);
  const isInfo = !!section.info;
  const doneCount = isInfo ? 0 : section.items.filter(i => completed[i.id]).length;
  const total = section.items.length;
  const tint = TINT[section.title] || TINT.default;

  return (
    <div className="mb-6 last:mb-0">
      <button onClick={() => setCollapsed(!collapsed)} className="flex items-center gap-2 mb-1 w-full text-left">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={`text-gray-300 transition-transform duration-150 ${collapsed ? "" : "rotate-90"}`}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: tint, opacity: 0.6 }} />
        <h3 className="text-xs font-semibold uppercase tracking-wider text-gray-400">{section.title}</h3>
        {!isInfo && doneCount === total && total > 0 && <Icon.Check size={12} className="text-emerald-400" />}
        {!isInfo && doneCount > 0 && doneCount < total && <span className="text-xs text-gray-300 font-medium">{doneCount}/{total}</span>}
      </button>
      {!collapsed && (
        <div className="pl-1 fade-in">
          {isInfo
            ? section.items.map(item => <InfoItem key={item.id} item={item} />)
            : section.items.map(item => (
                <CheckItem key={item.id} item={item} done={!!completed[item.id]} onToggle={() => onToggle(item.id)} />
              ))
          }
        </div>
      )}
    </div>
  );
}

/* ═══ DigestCard ═══ */
function DigestCard({ digest, completed, onToggle, onDelete, onRestore, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const actionItems = digest.sections.filter(s => !s.info).flatMap(s => s.items);
  const total = actionItems.length;
  const doneCount = actionItems.filter(i => completed[i.id]).length;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

  return (
    <div className="mb-8">
      <div className="flex items-center gap-2 mb-4">
        <button onClick={() => setOpen(!open)} className="flex items-center gap-2 group flex-1 text-left">
          <Icon.ChevronDown size={16} className={`text-gray-300 transition-transform duration-200 ${open ? "" : "-rotate-90"}`} />
          <h2 className={`text-lg font-semibold tracking-tight ${onRestore ? "text-gray-400" : "text-gray-900"}`}>{digest.date}</h2>
          <span className="text-xs text-gray-300 font-medium uppercase tracking-wider">{digest.type}</span>
        </button>
        {total > 0 && !onRestore && <span className="text-xs text-gray-300 font-medium">{doneCount}/{total}</span>}
        {/* Restore (archive view) */}
        {onRestore && (
          <button onClick={() => onRestore(digest.id)} className="ml-2 text-gray-300 hover:text-blue-500 transition-colors p-1 rounded-lg hover:bg-blue-50 flex items-center gap-1" title="Restore briefing">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            <span className="text-xs font-medium">Restore</span>
          </button>
        )}
        {/* Archive (normal view) */}
        {onDelete && (
          confirmDelete ? (
            <div className="flex items-center gap-1.5 ml-2">
              <button onClick={() => { onDelete(digest.id); setConfirmDelete(false); }} className="text-xs font-medium text-red-500 hover:text-red-600 transition-colors px-2 py-1 rounded-lg hover:bg-red-50">Archive</button>
              <button onClick={() => setConfirmDelete(false)} className="text-xs font-medium text-gray-400 hover:text-gray-500 transition-colors px-2 py-1 rounded-lg hover:bg-gray-50">Cancel</button>
            </div>
          ) : (
            <button onClick={() => setConfirmDelete(true)} className="ml-2 text-gray-200 hover:text-red-400 transition-colors p-1 rounded-lg hover:bg-gray-50" title="Archive briefing">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          )
        )}
      </div>

      {open && (
        <div className="fade-in">
          {digest.greeting && (
            <div className="flex items-start gap-3 mb-6 py-3 px-4 rounded-2xl" style={{ background: "rgba(59,130,246,0.04)" }}>
              <div className="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0 mt-0.5">
                <span className="text-white text-xs font-bold">M</span>
              </div>
              <p className="text-sm text-gray-600 leading-relaxed">{digest.greeting}</p>
            </div>
          )}

          {total > 0 && (
            <div className="flex items-center gap-3 mb-6">
              <div className="flex-1 h-1 bg-gray-100 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-500"
                  style={{ width: `${pct}%`, background: pct === 100 ? "#22c55e" : pct > 0 ? "#3b82f6" : "#e5e7eb" }} />
              </div>
              <span className={`text-xs font-medium tabular-nums w-10 text-right ${pct === 100 ? "text-emerald-500" : "text-gray-400"}`}>{pct}%</span>
            </div>
          )}

          {digest.sections.map((section, si) => (
            <Section key={si} section={section} completed={completed} onToggle={onToggle} defaultCollapsed={false} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══ State Persistence (jsonblob.com — free, CORS-friendly, no tokens) ═══ */
const BLOB_ID = "019daae5-3877-7cc6-9151-a2a22943ab55";
const BLOB_URL = "https://jsonblob.com/api/jsonBlob/" + BLOB_ID;

let writeQueue = null;
let remoteOk = true;

async function remoteRead() {
  try {
    const r = await fetch(BLOB_URL, {
      headers: { "Accept": "application/json" },
      cache: "no-store"
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    remoteOk = true;
    console.log("[state] remote read OK:", JSON.stringify(data));
    return data;
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote read FAILED:", e);
    return null;
  }
}

async function remoteWrite(state) {
  try {
    const r = await fetch(BLOB_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(state)
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    remoteOk = true;
    console.log("[state] remote write OK:", JSON.stringify(state));
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote write FAILED:", e);
  }
}

function debouncedWrite(state) {
  try { localStorage.setItem("llf-state", JSON.stringify(state)); } catch {}
  clearTimeout(writeQueue);
  writeQueue = setTimeout(() => remoteWrite(state), 800);
}

/* ═══ Reminder Box ═══ */
function ReminderBox({ reminders, onAdd, onRemove }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");

  const handleAdd = () => {
    const trimmed = text.trim();
    if (!trimmed) return;
    onAdd(trimmed);
    setText("");
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); }
  };

  return (
    <div className="mb-8">
      <button
        onClick={() => setOpen(!open)}
        className="flex items-center gap-2 text-sm font-medium text-gray-400 hover:text-gray-600 transition-colors group"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400 group-hover:text-blue-500 transition-colors"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Add reminder for next briefing
        {reminders.length > 0 && (
          <span className="bg-blue-100 text-blue-600 text-xs font-semibold px-1.5 py-0.5 rounded-full">{reminders.length}</span>
        )}
      </button>

      {open && (
        <div className="mt-3 fade-in">
          <div className="flex gap-2 mb-3">
            <input
              type="text"
              value={text}
              onChange={e => setText(e.target.value)}
              onKeyDown={handleKey}
              placeholder="e.g. Follow up with Hassan on escalation..."
              className="flex-1 px-3 py-2 text-sm bg-gray-50 border-0 rounded-xl text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all"
              autoFocus
            />
            <button
              onClick={handleAdd}
              disabled={!text.trim()}
              className="px-4 py-2 text-sm font-medium rounded-xl transition-all bg-gray-900 text-white hover:bg-gray-800 disabled:bg-gray-100 disabled:text-gray-300"
            >
              Add
            </button>
          </div>

          {reminders.length > 0 && (
            <div className="space-y-1.5">
              {reminders.map(r => (
                <div key={r.id} className="flex items-center gap-2 py-1.5 px-3 rounded-xl bg-blue-50/50 group">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400 flex-shrink-0"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                  <span className="text-sm text-gray-600 flex-1">{r.text}</span>
                  <button onClick={() => onRemove(r.id)} className="text-gray-200 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 p-0.5" title="Remove">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

/* ═══ Toggl Review Component ═══ */
function TogglReview({ review, onClear }) {
  const [entries, setEntries] = useState(review.entries || []);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [expandedId, setExpandedId] = useState(null);

  const toAST = (utc) => {
    const d = new Date(utc);
    return d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", timeZone:"America/Santo_Domingo" });
  };

  const durMin = (start, end) => Math.round((new Date(end) - new Date(start)) / 60000);

  const totalMin = entries.reduce((sum, e) => sum + durMin(e.start, e.end), 0);
  const totalH = (totalMin / 60).toFixed(1);

  const updateEntry = (id, field, value) => {
    setEntries(prev => prev.map(e => {
      if (e.id !== id) return e;
      const updated = { ...e, [field]: value };
      if (field === "project_id") {
        const proj = TOGGL_PROJECTS.find(p => p.id === value);
        if (proj) {
          updated.project_name = proj.name;
          updated.client_name = proj.client;
          updated.subcategory = proj.subs[0] || "";
        }
      }
      return updated;
    }));
  };

  const removeEntry = (id) => setEntries(prev => prev.filter(e => e.id !== id));

  const submitToToggl = async () => {
    setSubmitting(true);
    const authHeader = "Basic " + btoa(TOGGL_KEY + ":api_token");
    let ok = 0, fail = 0;

    for (const e of entries) {
      const body = {
        description: e.description,
        start: e.start,
        stop: e.end,
        duration: durMin(e.start, e.end) * 60,
        project_id: e.project_id,
        workspace_id: TOGGL_WS,
        tag_ids: e.tag_ids || [],
        created_with: "madison-dashboard"
      };

      try {
        const method = e.existing_entry_id ? "PUT" : "POST";
        const url = e.existing_entry_id
          ? "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries/" + e.existing_entry_id
          : "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries";
        const r = await fetch(url, {
          method,
          headers: { "Authorization": authHeader, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (r.ok) ok++; else fail++;
      } catch { fail++; }
    }

    setSubmitting(false);
    if (fail === 0) {
      setSubmitted(true);
      // Clear review from state
      onClear();
    } else {
      alert(ok + " submitted, " + fail + " failed. Check console.");
    }
  };

  if (submitted) {
    return (
      <div className="mb-10 py-6 px-5 rounded-2xl bg-emerald-50/50 text-center">
        <p className="text-sm font-medium text-emerald-600">All {entries.length} entries submitted to Toggl</p>
      </div>
    );
  }

  const sourceIcon = (s) => s === "calendar" ? "📅" : s === "pattern" ? "🔄" : "✋";

  return (
    <div className="mb-10">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-violet-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h2 className="text-lg font-semibold text-gray-900 tracking-tight">Toggl Review</h2>
          <span className="text-xs text-gray-300 font-medium">{review.date}</span>
        </div>
        <div className="flex items-center gap-2">
          <span className={`text-xs font-semibold tabular-nums px-2 py-1 rounded-full ${totalMin > 510 ? "bg-amber-100 text-amber-600" : totalMin >= 480 ? "bg-emerald-100 text-emerald-600" : "bg-gray-100 text-gray-500"}`}>
            {totalH}h / 8h
          </span>
        </div>
      </div>

      <div className="space-y-2">
        {entries.map((e) => {
          const isExpanded = expandedId === e.id;
          const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
          return (
            <div key={e.id} className="rounded-xl border border-gray-100 bg-white overflow-hidden transition-all hover:border-gray-200">
              {/* Collapsed row */}
              <div className="flex items-center gap-3 py-3 px-4 cursor-pointer" onClick={() => setExpandedId(isExpanded ? null : e.id)}>
                <span className="text-xs" title={e.source}>{sourceIcon(e.source)}</span>
                <span className="text-xs text-gray-400 tabular-nums w-28 flex-shrink-0">{toAST(e.start)} – {toAST(e.end)}</span>
                <span className="text-sm text-gray-800 flex-1 truncate">{e.description}</span>
                <span className="text-xs text-gray-300 truncate max-w-32">{e.project_name}</span>
                <button onClick={(ev) => { ev.stopPropagation(); removeEntry(e.id); }} className="text-gray-200 hover:text-red-400 transition-colors p-1">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>

              {/* Expanded edit panel */}
              {isExpanded && (
                <div className="px-4 pb-4 pt-1 border-t border-gray-50 fade-in space-y-3">
                  {/* Description */}
                  <div>
                    <label className="text-xs text-gray-400 block mb-1">Description</label>
                    <input type="text" value={e.description} onChange={(ev) => updateEntry(e.id, "description", ev.target.value)}
                      className="w-full text-sm px-3 py-2 bg-gray-50 rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-violet-100 text-gray-900" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    {/* Project (Category) */}
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Category</label>
                      <select value={e.project_id || ""} onChange={(ev) => updateEntry(e.id, "project_id", parseInt(ev.target.value))}
                        className="w-full text-sm px-3 py-2 bg-gray-50 rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-violet-100 text-gray-900 appearance-none">
                        {TOGGL_PROJECTS.map(p => (
                          <option key={p.id} value={p.id}>{p.client} › {p.name}</option>
                        ))}
                      </select>
                    </div>
                    {/* Subcategory */}
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Subcategory</label>
                      <select value={e.subcategory || ""} onChange={(ev) => updateEntry(e.id, "subcategory", ev.target.value)}
                        className="w-full text-sm px-3 py-2 bg-gray-50 rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-violet-100 text-gray-900 appearance-none">
                        {(proj ? proj.subs : []).map(s => (
                          <option key={s} value={s}>{s}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                  {/* Tag display */}
                  {e.tag_names && e.tag_names.length > 0 && (
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-xs text-gray-400">Tags:</span>
                      {e.tag_names.map(t => (
                        <span key={t} className="text-xs bg-violet-50 text-violet-500 px-2 py-0.5 rounded-full">{t}</span>
                      ))}
                    </div>
                  )}
                  {/* Time */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Start (AST)</label>
                      <input type="time" value={new Date(e.start).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"America/Santo_Domingo"})}
                        onChange={(ev) => {
                          const [h,m] = ev.target.value.split(":").map(Number);
                          const d = new Date(e.start);
                          d.setUTCHours(h+4, m, 0, 0);
                          updateEntry(e.id, "start", d.toISOString());
                        }}
                        className="w-full text-sm px-3 py-2 bg-gray-50 rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-violet-100 text-gray-900" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">End (AST)</label>
                      <input type="time" value={new Date(e.end).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"America/Santo_Domingo"})}
                        onChange={(ev) => {
                          const [h,m] = ev.target.value.split(":").map(Number);
                          const d = new Date(e.end);
                          d.setUTCHours(h+4, m, 0, 0);
                          updateEntry(e.id, "end", d.toISOString());
                        }}
                        className="w-full text-sm px-3 py-2 bg-gray-50 rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-violet-100 text-gray-900" />
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Actions */}
      <div className="flex items-center justify-between mt-5">
        <button onClick={onClear} className="text-xs text-gray-300 hover:text-gray-500 transition-colors">Dismiss</button>
        <button onClick={submitToToggl} disabled={submitting || entries.length === 0}
          className="px-5 py-2.5 text-sm font-medium rounded-xl transition-all bg-gray-900 text-white hover:bg-gray-800 disabled:bg-gray-100 disabled:text-gray-300">
          {submitting ? "Submitting..." : "Submit " + entries.length + " entries to Toggl"}
        </button>
      </div>
    </div>
  );
}

/* ═══ Main App ═══ */
function App() {
  const [digests, setDigests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [completed, setCompleted] = useState({});
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [hidden, setHidden] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [togglReview, setTogglReview] = useState(null);
  const [stateLoaded, setStateLoaded] = useState(false);
  const userActed = React.useRef(false); // only write after a real user action

  // Load digests + state on mount
  useEffect(() => {
    // Fetch digests.json
    fetch("digests.json?" + Date.now())
      .then(r => { if (!r.ok) throw new Error("Failed to load"); return r.json(); })
      .then(data => {
        const sorted = [...data].sort((a, b) => (b.isoDate || "").localeCompare(a.isoDate || ""));
        setDigests(sorted);
        setLoading(false);
      })
      .catch(e => { setError(e.message); setLoading(false); });

    // Load state: localStorage first (instant), then remote (authoritative)
    try {
      const local = JSON.parse(localStorage.getItem("llf-state") || "{}");
      if (local.completed && Object.keys(local.completed).length) setCompleted(local.completed);
      if (local.hidden && local.hidden.length) setHidden(local.hidden);
      if (local.reminders && local.reminders.length) setReminders(local.reminders);
      if (local.togglReview) setTogglReview(local.togglReview);
    } catch {}

    remoteRead().then(state => {
      if (state && state.completed) setCompleted(state.completed);
      if (state && state.hidden) setHidden(state.hidden);
      if (state && state.reminders) setReminders(state.reminders);
      if (state && state.togglReview) setTogglReview(state.togglReview);
      setStateLoaded(true);
    });
  }, []);

  // Persist state to remote — ONLY after a real user action (not on initial load)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedWrite({ completed, hidden, reminders, togglReview });
  }, [completed, hidden, reminders, togglReview, stateLoaded]);

  const toggle = useCallback((id) => {
    userActed.current = true;
    setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
  }, []);

  const deleteDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => [...prev, digestId]);
  }, []);

  const addReminder = useCallback((text) => {
    userActed.current = true;
    setReminders(prev => [...prev, { id: "rem-" + Date.now(), text, addedAt: new Date().toISOString() }]);
  }, []);

  const removeReminder = useCallback((remId) => {
    userActed.current = true;
    setReminders(prev => prev.filter(r => r.id !== remId));
  }, []);

  // Clock
  const [time, setTime] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(id); }, []);

  // Restore from archive
  const restoreDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => prev.filter(id => id !== digestId));
  }, []);

  // Filter & search
  const isArchiveView = typeFilter === "archived";

  const filtered = useMemo(() => {
    if (isArchiveView) {
      let list = digests.filter(d => hidden.includes(d.id));
      if (search.trim()) {
        const q = search.toLowerCase();
        list = list.filter(d =>
          d.date.toLowerCase().includes(q) ||
          (d.greeting || "").toLowerCase().includes(q) ||
          d.sections.some(s =>
            s.title.toLowerCase().includes(q) ||
            s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
          )
        );
      }
      return list;
    }
    let list = digests.filter(d => !hidden.includes(d.id));
    if (typeFilter !== "all") list = list.filter(d => d.type === typeFilter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d =>
        d.date.toLowerCase().includes(q) ||
        (d.greeting || "").toLowerCase().includes(q) ||
        d.sections.some(s =>
          s.title.toLowerCase().includes(q) ||
          s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
        )
      );
    }
    return list;
  }, [digests, typeFilter, search, hidden, isArchiveView]);

  // Unique types + archived tab
  const activeDigests = digests.filter(d => !hidden.includes(d.id));
  const types = useMemo(() => {
    const t = new Set(digests.filter(d => !hidden.includes(d.id)).map(d => d.type));
    const tabs = ["all", ...Array.from(t)];
    if (hidden.length > 0) tabs.push("archived");
    return tabs;
  }, [digests, hidden]);

  const greeting = (() => {
    const h = time.getHours();
    if (h < 12) return "Good morning";
    if (h < 18) return "Good afternoon";
    return "Good evening";
  })();

  const dateStr = time.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const timeStr = time.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  if (loading) {
    return (
      <div className="min-h-screen bg-white flex items-center justify-center">
        <div className="text-center">
          <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center mx-auto mb-3">
            <span className="text-white text-sm font-bold">M</span>
          </div>
          <p className="text-sm text-gray-400">Loading briefings...</p>
        </div>
      </div>
    );
  }

  if (error) {
    return (
      <div className="min-h-screen bg-white flex items-center justify-center">
        <div className="text-center max-w-sm">
          <p className="text-sm text-gray-900 font-medium mb-1">Couldn&apos;t load briefings</p>
          <p className="text-xs text-gray-400">Make sure <code className="bg-gray-100 px-1 py-0.5 rounded">digests.json</code> is in the same folder as this page.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-white">
      <div className="max-w-2xl mx-auto px-6 py-10">

        {/* Header */}
        <div className="mb-10">
          <div className="flex items-center justify-between mb-1">
            <h1 className="text-2xl font-bold tracking-tight text-gray-900">{greeting}, Jean 👋</h1>
            <img src="avatar.png" alt="" className="w-28 h-28 rounded-full object-cover shadow-md border-2 border-gray-100" onError={(e) => { e.target.style.display = 'none'; }} />
          </div>
          <p className="text-sm text-gray-400">{dateStr} &middot; Lisinski Law Firm &middot; <span className="tabular-nums">{timeStr}</span></p>
        </div>

        {/* Reminders for next digest */}
        {/* Toggl Review (appears when scheduled task generates proposals) */}
        {togglReview && togglReview.entries && togglReview.entries.length > 0 && (
          <TogglReview review={togglReview} onClear={() => { userActed.current = true; setTogglReview(null); }} />
        )}

        <ReminderBox reminders={reminders} onAdd={addReminder} onRemove={removeReminder} />

        {/* Search + filters */}
        <div className="mb-8">
          {/* Search */}
          <div className="relative mb-4">
            <Icon.Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300" />
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search briefings..."
              className="w-full pl-9 pr-4 py-2.5 text-sm bg-gray-50 border-0 rounded-xl text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all"
            />
          </div>

          {/* Type filter */}
          <div className="flex gap-1 flex-wrap">
            {types.map(t => {
              const count = t === "all" ? activeDigests.length
                : t === "archived" ? hidden.length
                : activeDigests.filter(d => d.type === t).length;
              return (
                <button
                  key={t}
                  onClick={() => setTypeFilter(t)}
                  className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all capitalize whitespace-nowrap ${
                    typeFilter === t
                      ? (t === "archived" ? "bg-gray-200 text-gray-600" : "bg-gray-900 text-white")
                      : (t === "archived" ? "text-gray-300 hover:text-gray-500 hover:bg-gray-50" : "text-gray-400 hover:text-gray-600 hover:bg-gray-50")
                  }`}
                >
                  {t === "all" ? `All (${count})` : `${t} (${count})`}
                </button>
              );
            })}
          </div>
        </div>

        {/* Digest list */}
        {filtered.length === 0 ? (
          <div className="text-center py-16">
            <p className="text-sm text-gray-400">{isArchiveView ? "No archived briefings." : "No briefings found."}</p>
          </div>
        ) : (
          filtered.map((d, i) => (
            <DigestCard
              key={d.id}
              digest={d}
              completed={completed}
              onToggle={toggle}
              onDelete={isArchiveView ? null : deleteDigest}
              onRestore={isArchiveView ? restoreDigest : null}
              defaultOpen={isArchiveView ? false : i === 0}
            />
          ))
        )}

        {/* Footer */}
        <div className="mt-12 pt-6 border-t border-gray-100 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-5 h-5 rounded-full bg-blue-600 flex items-center justify-center">
              <span className="text-white text-xs font-bold" style={{ fontSize: "9px" }}>M</span>
            </div>
            <span className="text-xs text-gray-300">Madison &middot; LLF Automation</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs text-gray-300">{digests.length - hidden.length} briefing{(digests.length - hidden.length) !== 1 ? "s" : ""}</span>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
