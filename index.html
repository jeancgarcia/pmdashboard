  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  /* Subtle neutral ambient glow — no blue cast */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 100vh;
    background: radial-gradient(circle at 50% -20%, rgba(0, 0, 0, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }
  .dark body::before {
    background: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
  }

  .fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Weekend mode — slow rotating conic gradient + gentle breathing */
  @keyframes weekendSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes weekendBreathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .weekend-ring {
    background: conic-gradient(from 0deg, #38bdf8, #818cf8, #c084fc, #f9a8d4, #818cf8, #38bdf8);
    animation: weekendSpin 20s linear infinite;
  }
  .weekend-breathe {
    animation: weekendBreathe 4s ease-in-out infinite;
  }

  /* Calm mode — subtle green wave when nothing urgent is pending */
  @keyframes calmSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .calm-ring {
    background: conic-gradient(from 0deg, #10b981, #34d399, #6ee7b7, #34d399, #10b981, #059669, #10b981);
    animation: calmSpin 12s linear infinite;
  }

  /* Progress bar shimmer — a light sweep, no gradient fill */
  @keyframes shimmer {
    0% { transform: translateX(-150%); }
    100% { transform: translateX(350%); }
  }
  .progress-shimmer {
    animation: shimmer 1.8s ease-in-out infinite;
  }
</style>

const TOGGL_KEY = "c4cdd69cef8e9ef2dd36a7c17286e609";
const TOGGL_WS = 20705602;
const TOGGL_PROJECTS = [
  /* ── Non-Utilized (billable:false) ── */

  { id:216469964, name:"Other work", client:"Non-Utilized", billable:false, subs:["Strategic intiatives"], tasks:{"Strategic intiatives":240573827} },
  { id:216469965, name:"Tasks", client:"Non-Utilized", billable:false, subs:["Performance Management & QA"], tasks:{"Performance Management & QA":240573828} },

  { id:216469995, name:"Process Engineering PMO", client:"Utilized-Non-Mat-Work", billable:true, subs:["Dashboards & Reporting","Data Analysis","Process Mapping"], tasks:{"Dashboards & Reporting":240573902,"Data Analysis":240573903,"Process Mapping":240573904} },
  { id:219085805, name:"Run the business", client:"Utilized-Non-Mat-Work", billable:true, subs:["Email/Calendar Admin"], tasks:{"Email/Calendar Admin":241466357} },

/* ═══ Toggl Review Component (redesigned) ═══ */
function TogglReviewTab({ onBack }) {
  const [entries, setEntries] = useState([]);
  const [reviewDate, setReviewDate] = useState("");
  const [loading, setLoading] = useState(true);
  const [expandedId, setExpandedId] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState(null);

  // Load from Supabase (id=2)
  useEffect(() => {
    (async () => {
      try {
        const { data: item, error: err } = await supabase.from('app_state').select('data').eq('id', 2).single();
        if (err || !item?.data?.entries || item.data.entries.length === 0 || item.data.submitted) { setLoading(false); return; }
        setEntries(item.data.entries);
        setReviewDate(item.data.date || "");
      } catch { }
      setLoading(false);
    })();
  }, []);

  const toAST = (utc) => new Date(utc).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", timeZone:"America/Santo_Domingo" });
  const durMin = (start, end) => Math.round((new Date(end) - new Date(start)) / 60000);
  const totalMin = entries.reduce((sum, e) => sum + durMin(e.start, e.end), 0);
  const totalH = (totalMin / 60).toFixed(1);
  const pctOf8 = Math.min(100, Math.round((totalMin / 480) * 100));

  const utilizedMin = entries.filter(e => {
    const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
    return proj && (proj.client.startsWith("Utilized"));
  }).reduce((sum, e) => sum + durMin(e.start, e.end), 0);
  const utilPct = totalMin > 0 ? Math.round((utilizedMin / totalMin) * 100) : 0;

  const updateEntry = (id, field, value) => {
    setEntries(prev => prev.map(e => {
      if (e.id !== id) return e;
      const updated = { ...e, [field]: value };
      if (field === "project_id") {
        const proj = TOGGL_PROJECTS.find(p => p.id === value);
        if (proj) {
          updated.project_name = proj.name;
          updated.client_name = proj.client;
          updated.subcategory = proj.subs[0] || "";
        }
      }
      return updated;
    }));
  };

  const removeEntry = (id) => setEntries(prev => prev.filter(e => e.id !== id));

  // Only proposed entries get submitted — existing Toggl entries are read-only
  const proposedEntries = useMemo(() => entries.filter(e => e.source !== "toggl"), [entries]);
  const existingEntries = useMemo(() => entries.filter(e => e.source === "toggl"), [entries]);

  const submitToToggl = async () => {
    setSubmitting(true);
    const proxyUrl = SUPABASE_URL + "/functions/v1/toggl-proxy";
    let ok = 0, fail = 0;
    for (const e of proposedEntries) {
      // Resolve task_id + billable from project + subcategory
      const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
      const taskId = e.task_id || proj?.tasks?.[e.subcategory] || (proj?.tasks ? Object.values(proj.tasks)[0] : null);
      const togglBody = {
        description: e.description,
        start: e.start,
        stop: e.end,
        duration: durMin(e.start, e.end) * 60,
        project_id: e.project_id,
        task_id: taskId,
        billable: proj?.billable ?? false,
        workspace_id: TOGGL_WS,
        tag_ids: e.tag_ids || [],
        created_with: "madison-dashboard"
      };
      const method = e.existing_entry_id ? "PUT" : "POST";
      const togglUrl = e.existing_entry_id
        ? "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries/" + e.existing_entry_id
        : "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries";
      try {
        const r = await fetch(proxyUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ method, url: togglUrl, body: togglBody, toggl_api_key: TOGGL_KEY })
        });
        if (r.ok) ok++; else fail++;
      } catch { fail++; }
    }
    setSubmitting(false);
    if (fail === 0) {
      setSubmitted(true);
      // Clear review data — mark as submitted so refresh doesn't reload them
      const { error: clearErr } = await supabase.from('app_state').update({ data: { submitted: true, date: reviewDate, entries: [] } }).eq('id', 2);
      if (clearErr) console.error("Failed to clear Supabase:", clearErr);
    } else {
      setError(ok + " submitted, " + fail + " failed.");
    }
  };

  const sourceIcon = (s) => s === "toggl" ? "✅" : s === "calendar" ? "📅" : s === "pattern" ? "🔄" : "✋";
  const sourceLabel = (s) => s === "toggl" ? "Already in Toggl" : s === "calendar" ? "From calendar" : s === "pattern" ? "Proposed" : "Manual";

  // Sort entries by start time
  const sorted = useMemo(() => [...entries].sort((a, b) => new Date(a.start) - new Date(b.start)), [entries]);

  if (loading) {
    return (
      <div className="fade-in">
        <div className="flex items-center gap-3 mb-6">
          <div className="h-8 w-48 bg-zinc-200 dark:bg-zinc-800 rounded-lg animate-pulse" />
        </div>
        {[1,2,3,4].map(i => (
          <div key={i} className="h-16 bg-zinc-100 dark:bg-zinc-800/50 rounded-2xl mb-3 animate-pulse" />
        ))}
      </div>
    );
  }

  if (submitted) {
    return (
      <div className="fade-in text-center py-20 px-6 rounded-[2rem] bg-emerald-50/50 dark:bg-emerald-900/10 border border-emerald-200/50 dark:border-emerald-800/30">
        <div className="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <Icon.Check size={24} className="text-emerald-500" />
        </div>
        <p className="text-base font-bold text-emerald-700 dark:text-emerald-300 mb-1">All {entries.length} entries submitted to Toggl</p>
        <p className="text-sm text-zinc-500 dark:text-zinc-400">You're all set for {reviewDate}.</p>
        <button onClick={onBack} className="mt-6 px-5 py-2.5 text-sm font-bold rounded-xl bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-white transition-all">
          Back to briefings
        </button>
      </div>
    );
  }

  if (entries.length === 0) {
    return (
      <div className="fade-in text-center py-20 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30">
        <div className="w-14 h-14 bg-violet-100 dark:bg-violet-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-violet-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <p className="text-base font-bold text-zinc-700 dark:text-zinc-300 mb-1">No Toggl entries to review</p>
        <p className="text-sm font-medium text-zinc-500 dark:text-zinc-500">The next batch generates at 4:30 PM from your calendar.</p>
      </div>
    );
  }

  return (
    <div className="fade-in">
      {/* Header */}
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
          <div className="flex items-center gap-2.5 mb-1">
            <div className="p-1.5 rounded-full bg-violet-100 dark:bg-violet-900/30">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-violet-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <h2 className="text-sm font-semibold text-zinc-700 dark:text-zinc-200">Time Entries for Review</h2>
          </div>
          <p className="text-xs font-medium text-zinc-400 dark:text-zinc-500 ml-9">{reviewDate ? new Date(reviewDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" }) : "Today"}</p>
        </div>
        <div className="flex items-center gap-3">
          {/* Utilization chip */}
          <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-50 dark:bg-zinc-800/50 border border-zinc-100 dark:border-zinc-800">
            <span className="text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Util</span>
            <span className={`text-xs font-extrabold tabular-nums ${utilPct >= 70 ? "text-emerald-500" : utilPct >= 50 ? "text-amber-500" : "text-zinc-400"}`}>{utilPct}%</span>
          </div>
          {/* Total hours chip */}
          <div className={`px-3 py-1.5 rounded-full text-xs font-extrabold tabular-nums border ${
            pctOf8 >= 100 ? "bg-emerald-50 dark:bg-emerald-900/10 text-emerald-600 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800/30"
            : pctOf8 >= 80 ? "bg-amber-50 dark:bg-amber-900/10 text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-800/30"
            : "bg-zinc-50 dark:bg-zinc-800/50 text-zinc-500 dark:text-zinc-400 border-zinc-200 dark:border-zinc-700"
          }`}>
            {totalH}h / 8h
          </div>
        </div>
      </div>

      {/* Progress bar */}
      <div className="mb-8 bg-zinc-50 dark:bg-zinc-900/50 p-3 rounded-2xl border border-zinc-100 dark:border-zinc-800">
        <div className="flex items-center gap-4">
          <div className="flex-1 h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden">
            <div className="h-full rounded-full transition-all duration-700 ease-out"
              style={{ width: pctOf8 + "%", background: pctOf8 >= 100 ? "#10b981" : pctOf8 >= 80 ? "#f59e0b" : "#3b82f6" }} />
          </div>
          <span className={`text-xs font-bold tabular-nums w-10 text-right ${pctOf8 >= 100 ? "text-emerald-500" : "text-zinc-400"}`}>{pctOf8}%</span>
        </div>
      </div>

      {/* Entries list */}
      <div className="space-y-2">
        {sorted.map((e) => {
          const isExpanded = expandedId === e.id;
          const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
          const mins = durMin(e.start, e.end);
          const isUtilized = proj && proj.client.startsWith("Utilized");
          const isExisting = e.source === "toggl";

          return (
            <div key={e.id} className={`rounded-2xl border overflow-hidden transition-all duration-200 ${
              isExisting
                ? "border-zinc-100 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/30 opacity-60"
                : isExpanded
                  ? "border-violet-200 dark:border-violet-800/40 bg-white dark:bg-zinc-900 shadow-sm"
                  : "border-zinc-100 dark:border-zinc-800 bg-white dark:bg-zinc-900/50 hover:border-zinc-200 dark:hover:border-zinc-700"
            }`}>
              {/* Collapsed row */}
              <div className={`flex items-center gap-3 py-3.5 px-4 group ${isExisting ? "cursor-default" : "cursor-pointer"}`} onClick={() => !isExisting && setExpandedId(isExpanded ? null : e.id)}>

/* ═══ Avatar Hub — status ring + stats popover + settings ═══ */
function AvatarHub({ digests, completed, reminders, theme, onThemeToggle }) {
  const [open, setOpen] = useState(false);
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    const esc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open]);

  // Today detection
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0 = Sun, 6 = Sat
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const dayName = now.toLocaleDateString("en-US", { weekday: "long" });

  // Today's digest (most relevant one — exact match, then latest)
  const todayDigest = useMemo(() => {
    return digests.find(d => d.isoDate === todayIso) || digests[0] || null;
  }, [digests, todayIso]);

  const stats = useMemo(() => {
    if (!todayDigest) return { total: 0, done: 0, pct: 0, urgent: 0 };
    const actionItems = todayDigest.sections.filter(s => !s.info).flatMap(s => s.items);
    const total = actionItems.length;
    const done = actionItems.filter(i => completed[i.id]).length;
    const urgent = actionItems.filter(i => i.flag === "urgent" && !completed[i.id]).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, pct, urgent };
  }, [todayDigest, completed]);

  const perfectDays = useMemo(() => {
    let count = 0;
    for (const d of digests) {
      const items = d.sections.filter(s => !s.info).flatMap(s => s.items);
      if (items.length === 0) continue;
      if (items.every(i => completed[i.id])) count++;
    }
    return count;
  }, [digests, completed]);

  // Ring state (weekday only)
  // - no items or no urgent pending → calm green wave
  // - urgent pending → solid red
  const isCalm = !isWeekend && stats.urgent === 0;
  const ringColor = stats.urgent > 0 ? "#ef4444" : "#10b981";

  return (
    <div ref={wrapperRef} className="relative">
      <button
        onClick={() => setOpen(!open)}
        className={`relative rounded-full transition-transform hover:scale-105 active:scale-95 ${isWeekend ? "weekend-breathe" : ""}`}
        title="Your day at a glance"
        aria-label="Open profile menu"
      >
        {/* Status ring */}
        <div
          className={`absolute inset-0 rounded-full ${isWeekend ? "weekend-ring" : isCalm ? "calm-ring" : ""}`}
          style={!isWeekend && !isCalm ? { background: ringColor } : undefined}
        />
        {/* Avatar image (with inset padding so ring shows) */}
        <div className="relative m-[3px] w-14 h-14 sm:w-16 sm:h-16 md:w-24 md:h-24 rounded-full overflow-hidden border-2 border-white dark:border-zinc-900 shadow-lg shadow-zinc-300/40 dark:shadow-zinc-950/60">
          <img src="avatar.png" alt="Jean" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
        </div>
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-3 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-5 z-50 fade-in">
          {/* Header */}
          <div className="flex items-center gap-3 mb-5">
            <img src="avatar.png" alt="" className="w-11 h-11 rounded-full object-cover border-2 border-white dark:border-zinc-800 shadow-sm" onError={(e) => { e.target.style.display = 'none'; }} />
            <div>
              <p className="text-sm font-extrabold text-zinc-900 dark:text-zinc-50">Jean</p>
              <p className="text-xs font-medium text-zinc-400 dark:text-zinc-500">{dayName}{isWeekend ? " · Weekend mode" : ""}</p>
            </div>
          </div>

          {/* Today progress */}
          {stats.total > 0 ? (
            <div className="mb-5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Today</span>
                <span className={`text-xs font-bold tabular-nums ${stats.pct === 100 ? "text-emerald-500" : "text-zinc-700 dark:text-zinc-300"}`}>{stats.done}/{stats.total} &middot; {stats.pct}%</span>
              </div>
              <div className="h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div
                  className="h-full rounded-full transition-all duration-500 relative overflow-hidden"
                  style={{
                    width: `${stats.pct}%`,
                    background: stats.pct === 100 ? "#10b981" : stats.urgent > 0 ? "#ef4444" : "#3b82f6"
                  }}
                >
                  {stats.pct > 0 && stats.pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%)", width: "70%" }} />
                  )}

            </div>
          ) : (
            <div className="mb-5 py-3 text-center text-xs text-zinc-400 dark:text-zinc-500 italic">No briefing for today yet.</div>
          )}

          {/* Stat chips */}
          <div className="grid grid-cols-2 gap-2 mb-5">
            <div className={`rounded-xl px-3 py-2.5 ${stats.urgent > 0 ? "bg-red-50 dark:bg-red-500/10" : "bg-zinc-50 dark:bg-zinc-800/50"}`}>

            <div className={`rounded-xl px-3 py-2.5 ${reminders.length > 0 ? "bg-blue-50 dark:bg-blue-500/10" : "bg-zinc-50 dark:bg-zinc-800/50"}`}>

/* ═══ Calendar Button — date picker for jumping to briefings ═══ */
function CalendarButton({ digests, selectedDate, onSelect }) {
  const [open, setOpen] = useState(false);
  const [monthCursor, setMonthCursor] = useState(() => {
    const seed = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
    return new Date(seed.getFullYear(), seed.getMonth(), 1);
  });
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    const esc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open]);

  const datesWithDigests = useMemo(() => {
    const map = new Map();
    for (const d of digests) {
      if (!d.isoDate) continue;
      map.set(d.isoDate, (map.get(d.isoDate) || 0) + 1);
    }
    return map;
  }, [digests]);

  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${today.getDate().toString().padStart(2, "0")}`;

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = monthCursor.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const hasAny = datesWithDigests.size > 0;

  return (
    <div ref={wrapperRef} className="relative flex-shrink-0">
      <button
        onClick={() => setOpen(!open)}
        className={`flex items-center justify-center w-[46px] h-[46px] rounded-2xl border shadow-sm transition-all ${
          open || selectedDate
            ? "bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-zinc-900 dark:border-white"
            : "bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600"
        }`}
        title="Browse by date"
        aria-label="Open calendar"
      >
        <Icon.Calendar size={18} />
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-2 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-4 z-50 fade-in">
          {/* Month nav */}
          <div className="flex items-center justify-between mb-4">
            <button
              onClick={() => setMonthCursor(new Date(year, month - 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Previous month"
            >
              <Icon.ChevronRight size={14} className="rotate-180" />
            </button>
            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-100 tabular-nums">{monthLabel}</h3>
            <button
              onClick={() => setMonthCursor(new Date(year, month + 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Next month"
            >
              <Icon.ChevronRight size={14} />
            </button>
          </div>

          {/* Weekday headers */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {["S","M","T","W","T","F","S"].map((d, i) => (
              <div key={i} className="text-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider py-1">{d}</div>
            ))}
          </div>

          {/* Day grid */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((day, i) => {
              if (day === null) return <div key={i} className="h-9" />;
              const iso = `${year}-${pad(month + 1)}-${pad(day)}`;
              const hasD = datesWithDigests.has(iso);
              const isToday = iso === todayIso;
              const isSelected = iso === selectedDate;
              return (
                <button
                  key={i}
                  onClick={() => { if (hasD) { onSelect(iso); setOpen(false); } }}
                  disabled={!hasD}
                  className={`relative h-9 rounded-lg text-xs font-semibold transition-all flex items-center justify-center tabular-nums ${
                    isSelected
                      ? "bg-blue-500 text-white shadow-md shadow-blue-500/30"
                      : hasD
                        ? "text-zinc-900 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer"
                        : "text-zinc-300 dark:text-zinc-700 cursor-not-allowed"
                  } ${isToday && !isSelected ? "ring-1 ring-blue-400 ring-inset" : ""}`}
                  title={hasD ? `${datesWithDigests.get(iso)} briefing${datesWithDigests.get(iso) > 1 ? "s" : ""}` : undefined}
                >
                  {day}
                  {hasD && !isSelected && (
                    <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-blue-500" />
                  )}
                </button>
              );
            })}
          </div>

          {/* Footer actions */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex gap-2">
            <button
              onClick={() => {
                setMonthCursor(new Date(today.getFullYear(), today.getMonth(), 1));
                if (datesWithDigests.has(todayIso)) { onSelect(todayIso); setOpen(false); }
              }}
              className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors"
            >
              Today
            </button>
            {selectedDate && (
              <button
                onClick={() => { onSelect(null); setOpen(false); }}
                className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 bg-zinc-100 dark:bg-zinc-800 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors"
              >
                Clear filter
              </button>
            )}
          </div>

          {!hasAny && (
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500 text-center mt-3 italic">No briefings available yet.</p>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ Text highlight helper ═══ */
function highlight(text, query) {
  if (!query || !text) return text;
  const q = query.trim().toLowerCase();
  if (!q) return text;
  const lower = text.toLowerCase();
  const out = [];
  let i = 0, key = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx === -1) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(
      <mark key={key++} className="bg-amber-200/80 dark:bg-amber-400/30 text-zinc-900 dark:text-amber-100 px-0.5 rounded-sm font-semibold">
        {text.slice(idx, idx + q.length)}
      </mark>
    );
    i = idx + q.length;
  }
  return out;
}

function itemMatches(item, q) {
  if (!q) return false;
  return item.label.toLowerCase().includes(q) || (item.detail || "").toLowerCase().includes(q);
}

function sectionMatches(section, q) {
  if (!q) return false;
  return section.title.toLowerCase().includes(q) || section.items.some(i => itemMatches(i, q));
}

/* ═══ CheckItem (interactive) ═══ */
function CheckItem({ item, done, onToggle, searchQuery }) {
  return (

/* ═══ Section ═══ */
function Section({ section, completed, onToggle, defaultCollapsed, searchQuery }) {
  const [collapsed, setCollapsed] = useState(defaultCollapsed);
  const isInfo = !!section.info;
  const doneCount = isInfo ? 0 : section.items.filter(i => completed[i.id]).length;
  const total = section.items.length;
  const tint = TINT[section.title] || TINT.default;
  const q = (searchQuery || "").trim().toLowerCase();
  const hasMatch = q ? sectionMatches(section, q) : false;
  const effectiveCollapsed = q ? !hasMatch : collapsed;

  return (
    <div className="mb-6 last:mb-0">
      <button onClick={() => setCollapsed(!collapsed)} disabled={!!q} className="flex items-center gap-2 mb-1.5 w-full text-left group disabled:cursor-default">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={`text-zinc-400 dark:text-zinc-500 transition-transform duration-200 group-hover:text-zinc-600 dark:group-hover:text-zinc-300 ${effectiveCollapsed ? "" : "rotate-90"}`}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0 shadow-sm" style={{ background: tint, opacity: 0.8 }} />
        <h3 className="text-xs font-bold uppercase tracking-wider text-zinc-500 dark:text-zinc-400 transition-colors group-hover:text-zinc-700 dark:group-hover:text-zinc-200">{highlight(section.title, searchQuery)}</h3>
        {!isInfo && doneCount === total && total > 0 && <Icon.Check size={12} className="text-emerald-500 drop-shadow-sm" />}
        {!isInfo && doneCount > 0 && doneCount < total && <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded-md">{doneCount}/{total}</span>}
      </button>

      <div className={`grid transition-all duration-300 ease-in-out ${effectiveCollapsed ? "grid-rows-[0fr] opacity-0" : "grid-rows-[1fr] opacity-100"}`}>
        <div className="overflow-hidden">
          <div className="pl-1 pt-1 pb-1">
            {isInfo
              ? section.items.map(item => <InfoItem key={item.id} item={item} searchQuery={searchQuery} />)
              : section.items.map(item => (
                  <CheckItem key={item.id} item={item} done={!!completed[item.id]} onToggle={() => onToggle(item.id)} searchQuery={searchQuery} />
                ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ DigestCard ═══ */
function DigestCard({ digest, completed, onToggle, onDelete, onRestore, defaultOpen, searchQuery }) {
  const [open, setOpen] = useState(defaultOpen);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const actionItems = digest.sections.filter(s => !s.info).flatMap(s => s.items);
  const total = actionItems.length;
  const doneCount = actionItems.filter(i => completed[i.id]).length;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
  const q = (searchQuery || "").trim().toLowerCase();
  const effectiveOpen = q ? true : open;

  const matchCount = useMemo(() => {
    if (!q) return 0;
    let n = 0;
    if (digest.date.toLowerCase().includes(q)) n++;
    if ((digest.greeting || "").toLowerCase().includes(q)) n++;
    for (const s of digest.sections) {
      if (s.title.toLowerCase().includes(q)) n++;
      for (const i of s.items) {
        if (i.label.toLowerCase().includes(q)) n++;
        if ((i.detail || "").toLowerCase().includes(q)) n++;
      }
    }
    return n;
  }, [q, digest]);

  return (
    <div className="mb-10 sm:mb-12 transition-all duration-300 w-full relative">
             
      <div className="flex items-center gap-2 mb-4 px-2 sm:px-4">
        <button onClick={() => setOpen(!open)} disabled={!!q} className="flex items-center gap-3 group flex-1 text-left disabled:cursor-default">

            <Icon.ChevronDown size={14} className="text-zinc-500 dark:text-zinc-400 group-hover:text-zinc-800 dark:group-hover:text-zinc-200 transition-colors" />
          </div>
          <div>
            <h2 className={`text-lg font-bold tracking-tight transition-colors ${onRestore ? "text-zinc-400 dark:text-zinc-500" : "text-zinc-900 dark:text-zinc-50"}`}>{highlight(digest.date, searchQuery)}</h2>
            <div className="flex items-center gap-2 mt-0.5">
               <span className="text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">{digest.type}</span>
            </div>
          </div>
        </button>
        {q && matchCount > 0 && (
          <span className="text-[10px] font-bold text-amber-700 dark:text-amber-300 bg-amber-100 dark:bg-amber-500/20 px-2 py-0.5 rounded-full tabular-nums mr-2" title={`${matchCount} match${matchCount > 1 ? "es" : ""}`}>{matchCount} match{matchCount > 1 ? "es" : ""}</span>
        )}
        {total > 0 && !onRestore && !q && (
          <div className="flex flex-col items-end gap-1 mr-2">
             <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded-full">{doneCount}/{total}</span>
          </div>
        )}
        
        {/* Actions */}
        <div className="flex items-center">
          {onRestore && (
            <button onClick={() => onRestore(digest.id)} className="text-zinc-400 hover:text-blue-500 transition-all p-2 rounded-xl hover:bg-blue-50 dark:hover:bg-zinc-700 flex items-center gap-1.5" title="Restore briefing">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              <span className="text-xs font-semibold">Restore</span>
            </button>
          )}
          {onDelete && (
            confirmDelete ? (
              <div className="flex items-center gap-1.5">
                <button onClick={() => { onDelete(digest.id); setConfirmDelete(false); }} className="text-xs font-bold text-red-500 hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-red-50 dark:bg-red-500/10 hover:bg-red-500">Archive</button>
                <button onClick={() => setConfirmDelete(false)} className="text-xs font-bold text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700">Cancel</button>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} className="text-zinc-400 hover:text-red-500 transition-all p-2 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10" title="Archive briefing">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            )
          )}
        </div>
      </div>

      {effectiveOpen && (
        <div className="fade-in mt-2 pt-6 border-t border-zinc-200/50 dark:border-zinc-700/50">
          {digest.greeting && (
            <div className="flex items-start gap-4 mb-8 py-4 px-5 rounded-2xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-800/30">
              <div className="w-8 h-8 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                <span className="text-white text-sm font-bold">M</span>
              </div>
              <p className="text-sm text-zinc-700 dark:text-zinc-300 leading-relaxed font-medium">{highlight(digest.greeting, searchQuery)}</p>
            </div>
          )}

          {total > 0 && (
            <div className="flex items-center gap-4 mb-8 bg-zinc-50 dark:bg-zinc-900/50 p-3 rounded-2xl border border-zinc-100 dark:border-zinc-800">
              <div className="flex-1 h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700 ease-out relative overflow-hidden"
                  style={{
                    width: `${pct}%`,
                    background: pct === 100 ? "#10b981" : pct > 0 ? "#3b82f6" : "transparent"
                  }}>
                  {pct === 100 && <div className="absolute inset-0 bg-white/20 animate-pulse" />}
                  {pct > 0 && pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%)", width: "70%" }} />
                  )}
                </div>
              </div>
              <span className={`text-xs font-bold tabular-nums w-10 text-right transition-colors ${pct === 100 ? "text-emerald-500 drop-shadow-[0_0_8px_rgba(16,185,129,0.4)]" : "text-zinc-400"}`}>{pct}%</span>
            </div>
          )}

          <div className="space-y-2">
            {digest.sections.map((section, si) => (
              <Section key={si} section={section} completed={completed} onToggle={onToggle} defaultCollapsed={false} searchQuery={searchQuery} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const SUPABASE_URL = "https://niqzkombzncxxihhulqq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcXprb21iem5jeHhpaGh1bHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI5NTgsImV4cCI6MjA4OTI2ODk1OH0.9DMbwxPi4yBkXG034sakwh6tnxt-AUcKkt_MER71qcg";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let writeQueue = null;
let remoteOk = true;

async function remoteRead() {
  try {
    const { data: item, error } = await supabase.from('app_state').select('data').eq('id', 1).single();
    if (error && error.code !== 'PGRST116') throw error;
    const data = item && item.data ? item.data : null;
    remoteOk = true;
    console.log("[state] remote read OK:", JSON.stringify(data));
    return data;
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote read FAILED:", e);
    return null;
  }
}

async function remoteWrite(state) {
  try {
    const { error } = await supabase.from('app_state').upsert({ id: 1, data: state });
    if (error) throw error;
    remoteOk = true;
    console.log("[state] remote write OK:", JSON.stringify(state));
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote write FAILED:", e);
  }
}

function debouncedWrite(state) {
  try { localStorage.setItem("llf-state", JSON.stringify(state)); } catch {}
  clearTimeout(writeQueue);
  writeQueue = setTimeout(() => remoteWrite(state), 800);
}

/* ═══ Quick Adder — compact pill, single source of truth for adding ═══ */
function ReminderQuickAdd({ reminders, onAdd, onSeeAll, onBack, isOnRemindersTab }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");

  const handleAdd = () => {
    const trimmed = text.trim();
    if (!trimmed) return;
    onAdd(trimmed);
    setText("");
    setOpen(false);
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); }
    if (e.key === "Escape") { setOpen(false); setText(""); }
  };

  if (open) {
    return (
      <div className="mb-8 flex flex-col sm:flex-row gap-2">
        <input
          autoFocus
          type="text"
          value={text}

          className="flex-1 min-w-0 px-4 py-3 text-sm bg-white dark:bg-zinc-800 border border-blue-400 dark:border-blue-500 ring-2 ring-blue-500/20 shadow-sm rounded-xl text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none transition-all font-medium min-h-[44px]"
        />
        <div className="flex gap-2">
          <button
            onClick={handleAdd}
            disabled={!text.trim()}

          >
            Add

          <button
            onClick={() => { setOpen(false); setText(""); }}
            className="px-4 py-3 text-sm font-bold rounded-xl transition-all bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 min-h-[44px]"

      >

/* ═══ Full Reminders View — list + empty state + history ═══ */
function RemindersView({ reminders, onRemove, reminderHistory }) {

  /* Group history by digestDate */
  const grouped = useMemo(() => {
    if (!reminderHistory || !reminderHistory.length) return [];
    const map = {};
    reminderHistory.forEach(r => {
      const key = r.digestDate || r.consumedAt?.split("T")[0] || "Unknown";
      if (!map[key]) map[key] = { digestDate: key, digestId: r.digestId, items: [] };
      map[key].items.push(r);
    });
    return Object.values(map).sort((a, b) => b.digestDate.localeCompare(a.digestDate));

  return (
    <div className="fade-in">

              <span className="text-sm font-medium text-zinc-700 dark:text-zinc-300 flex-1 min-w-0 break-words leading-relaxed">{r.text}</span>

                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

            <BellIcon size={22} className="text-blue-500" />

                    ))}

              ))}

          )}
        </div>
      )}
    </div>
  );
}

/* ═══ Main App ═══ */
function App() {
  const [digests, setDigests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [completed, setCompleted] = useState({});
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [selectedDate, setSelectedDate] = useState(null);
  const [hidden, setHidden] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [reminderHistory, setReminderHistory] = useState([]);
  const [stateLoaded, setStateLoaded] = useState(false);
  const userActed = React.useRef(false); // only write after a real user action
  const [activeModule, setActiveModule] = useState("digests");
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const mobileMenuRef = useRef(null);
  const searchRef = useRef(null);

  // Close mobile menu on outside click / Escape
  useEffect(() => {
    if (!mobileMenuOpen) return;
    const handler = (e) => { if (mobileMenuRef.current && !mobileMenuRef.current.contains(e.target)) setMobileMenuOpen(false); };
    const esc = (e) => { if (e.key === "Escape") setMobileMenuOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("keydown", esc); };
  }, [mobileMenuOpen]);

  // ⌘K / Ctrl+K focus search
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        searchRef.current?.focus();
        searchRef.current?.select();
      }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  // Theme Management
  const [theme, setTheme] = useState(() => {
    if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    localStorage.setItem("theme", theme);
  }, [theme]);

  // Fetch digests — extracted so Sync button can call it too
  const loadDigests = useCallback((isManual = false) => {
    if (isManual) setSyncing(true);
    fetch("digests.json?" + Date.now(), { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error("Failed to load"); return r.json(); })
      .then(data => {
        const sorted = [...data].sort((a, b) => (b.isoDate || "").localeCompare(a.isoDate || ""));
        setDigests(sorted);
        setLoading(false);
        setSyncing(false);
      })
      .catch(e => { setError(e.message); setLoading(false); setSyncing(false); });
  }, []);

  // Load digests + state on mount
  useEffect(() => {
    // Fetch digests.json
    loadDigests();

    // Load state: localStorage first (instant), then remote (authoritative)
    try {
      const local = JSON.parse(localStorage.getItem("llf-state") || "{}");
      if (local.completed && Object.keys(local.completed).length) setCompleted(local.completed);
      if (local.hidden && local.hidden.length) setHidden(local.hidden);
      if (local.reminders && local.reminders.length) setReminders(local.reminders);
      if (local.reminderHistory && local.reminderHistory.length) setReminderHistory(local.reminderHistory);
    } catch {}

    remoteRead().then(state => {
      // Only apply remote state if the user hasn't acted yet.
      // If they toggled something while Supabase was loading, their change wins — don't overwrite it.
      if (!userActed.current) {
        if (state && state.completed) setCompleted(state.completed);
        if (state && state.hidden) setHidden(state.hidden);
        if (state && state.reminders) setReminders(state.reminders);
        if (state && state.reminderHistory) setReminderHistory(state.reminderHistory);
      } else {
        // User already acted — merge remote state without touching completed/hidden
        if (state && state.reminders) setReminders(prev => prev.length ? prev : (state.reminders || []));
        if (state && state.reminderHistory) setReminderHistory(prev => prev.length ? prev : (state.reminderHistory || []));
      }
      setStateLoaded(true);
    });
  }, []);

  // Persist state to remote — ONLY after a real user action (not on initial load)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedWrite({ completed, hidden, reminders, reminderHistory });
  }, [completed, hidden, reminders, reminderHistory, stateLoaded]);

  const toggle = useCallback((id) => {
    userActed.current = true;
    setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
  }, []);

  const deleteDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => [...prev, digestId]);
  }, []);

  const addReminder = useCallback((text) => {
    userActed.current = true;
    setReminders(prev => [...prev, { id: "rem-" + Date.now(), text, addedAt: new Date().toISOString() }]);

  const filtered = useMemo(() => {

              >
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={syncing ? "animate-spin" : ""}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                {syncing && <span className="text-[10px] font-semibold tracking-wide">Syncing…</span>}
              </button>
            </div>
            {/* Greeting + avatar row — visible on all breakpoints */}
            <div className="flex items-center justify-between gap-4 md:pr-32">
              <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight text-zinc-900 dark:text-white drop-shadow-sm leading-tight">{greeting},<br className="sm:hidden" /><span className="sm:hidden"> </span>Jean 👋</h1>
              <div className="flex-shrink-0 md:absolute md:right-0 md:top-1/2 md:-translate-y-1/2 md:z-10">
                <AvatarHub
                  digests={digests}
                  completed={completed}
                  reminders={reminders}
                  theme={theme}
                  onThemeToggle={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                />
              </div>
            </div>
          </div>

          {/* ═══ DIGESTS MODULE ═══ */}
          {activeModule === "digests" && (
            <>
              {/* Quick-add reminder pill */}
              <ReminderQuickAdd
                reminders={reminders}
                onAdd={addReminder}
                onSeeAll={() => setTypeFilter("reminders")}
                onBack={() => setTypeFilter("all")}
                isOnRemindersTab={isRemindersView}
              />

              {/* Filters area */}
              {!isRemindersView && (
              <div className="mb-10 w-full">
                {/* Search + Calendar */}
                <div className="flex gap-2 mb-5">
                  <div className="relative flex-1 group">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 p-1 rounded-full group-focus-within:bg-blue-50 dark:group-focus-within:bg-blue-900/30 transition-colors">
                      <Icon.Search size={16} className="text-zinc-400 group-focus-within:text-blue-500 transition-colors" />
                    </div>
                    <input
                      ref={searchRef}
                      type="text"
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                      placeholder="Search briefings..."
                      className="w-full pl-12 pr-16 py-3 text-sm font-medium bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700 shadow-sm rounded-2xl text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all"
                    />
                    <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
                      {search ? (
                        <button
                          onClick={() => { setSearch(""); searchRef.current?.focus(); }}
                          className="p-1.5 rounded-lg bg-zinc-100 dark:bg-zinc-700 text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 transition-colors"
                          aria-label="Clear search"
                        >
                          <Icon.X size={12} />
                        </button>
                      ) : (
                        <kbd className="hidden sm:flex items-center px-1.5 py-0.5 text-[10px] font-bold text-zinc-400 dark:text-zinc-500 bg-zinc-100 dark:bg-zinc-800 rounded-md border border-zinc-200 dark:border-zinc-700 group-focus-within:opacity-0 transition-opacity pointer-events-none select-none">
                          ⌘K
                        </kbd>
                      )}
                    </div>
                  </div>
                  <CalendarButton digests={digests} selectedDate={selectedDate} onSelect={setSelectedDate} />
                </div>

                {/* Active date filter chip */}
                {selectedDate && (
                  <div className="flex items-center gap-2 mb-5 fade-in">
                    <button
                      onClick={() => setSelectedDate(null)}
                      className="flex items-center gap-2 pl-3 pr-2 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow-sm shadow-blue-500/20 hover:bg-blue-600 transition-all active:scale-95 group"
                      title="Clear date filter"
                    >
                      <Icon.Calendar size={12} />
                      <span>{new Date(selectedDate + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</span>
                      <span className="p-0.5 rounded-full bg-white/20 group-hover:bg-white/30 transition-colors">
                        <Icon.X size={10} />
                      </span>
                    </button>
                  </div>
                )}

                {/* Type filter — digest types only (no toggl) */}
                <div className="flex gap-2 flex-wrap">
                  {types.filter(t => t !== "toggl").map(t => {
                    const count = t === "all" ? activeDigests.length
                      : t === "archived" ? hidden.length
                      : activeDigests.filter(d => d.type === t).length;
                    const isMuted = t === "archived";
                    return (
                      <button
                        key={t}
                        onClick={() => setTypeFilter(t)}
                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap shadow-sm active:scale-95 ${
                          typeFilter === t
                            ? (isMuted ? "bg-zinc-700 text-white dark:bg-zinc-200 dark:text-zinc-900" : "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900")
                            : (isMuted ? "bg-white dark:bg-zinc-800 text-zinc-500 hover:text-zinc-700 border border-zinc-200 dark:border-zinc-700 dark:hover:text-zinc-300" : "bg-white dark:bg-zinc-800 text-zinc-600 hover:text-zinc-900 border border-zinc-200 dark:border-zinc-700 dark:hover:text-zinc-200")
                        }`}
                      >
                        {`${{ all: "All", daily: "Daily", eod: "EOD", weekly: "Weekly", archived: "Archived" }[t] ?? (t.charAt(0).toUpperCase() + t.slice(1))} (${count})`}
                      </button>
                    );
                  })}
                </div>
              </div>
              )}

              {/* Digest content */}
              {isRemindersView ? (
                <RemindersView reminders={reminders} onRemove={removeReminder} reminderHistory={reminderHistory} />
              ) : filtered.length === 0 ? (
                <div className="text-center py-20 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30 backdrop-blur-md">
                  <div className="w-14 h-14 bg-zinc-100 dark:bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Icon.Search size={24} className="text-zinc-400 dark:text-zinc-500" />
                  </div>
                  <p className="text-base font-bold text-zinc-700 dark:text-zinc-300 mb-1">
                    {isArchiveView ? "No archived briefings" : "No briefings found"}
                  </p>
                  <p className="text-sm font-medium text-zinc-500 dark:text-zinc-500">Try adjusting your filters or search terms.</p>
                </div>
              ) : (
                <div className="space-y-4 relative">
                  {filtered.map((d, i) => (
                    <DigestCard
                      key={d.id}
                      digest={d}
                      completed={completed}
                      onToggle={toggle}
                      onDelete={isArchiveView ? null : deleteDigest}
                      onRestore={isArchiveView ? restoreDigest : null}
                      defaultOpen={isArchiveView ? false : i === 0}
                      searchQuery={search}
                    />
                  ))}
                </div>
              )}
            </>
          )}

          {/* ═══ TOGGL MODULE ═══ */}
          {activeModule === "toggl" && (
            <TogglReviewTab onBack={() => { setActiveModule("digests"); setTypeFilter("all"); }} />
          )}

          {/* Footer */}
          <div className="mt-16 pt-8 border-t border-zinc-200/60 dark:border-zinc-800 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-6 h-6 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center">
                <span className="text-white text-xs font-bold" style={{ fontSize: "10px" }}>M</span>
              </div>
              <span className="text-xs font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Madison &middot; LLF Automation</span>
            </div>
            <div className="flex items-center gap-2 bg-zinc-100 dark:bg-zinc-800 px-3 py-1.5 rounded-full">
              <span className="text-xs font-bold text-zinc-500 dark:text-zinc-400">{activeModule === "digests" ? `${digests.length - hidden.length} active briefings` : "Time review"}</span>
            </div>
          </div>

        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
