<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useMemo } = React;

/* ═══ SVG Icons (inline, zero dependencies) ═══ */
const Icon = {
  Check: ({ size = 16, ...p }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>

  ChevronDown: ({ size = 16, ...p }) => (

  ),
  ChevronRight: ({ size = 16, ...p }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="9 18 15 12 9 6"/></svg>
  ),
  Search: ({ size = 16, ...p }) => (

  ),
  Sun: ({ size = 16, ...p }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  ),
  Moon: ({ size = 16, ...p }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  ),
};

/* ═══ Section color tints ═══ */
const TINT = {
  "Today\u2019s Schedule": "#f59e0b",
  "Action Items": "#3b82f6",
  "Emails Awaiting Reply": "#8b5cf6",
  "Teams Highlights": "#06b6d4",
  "Out of Office": "#9ca3af",
  "Monday Preview": "#10b981",
  "Next Day Preview": "#10b981",
  "Week Summary": "#3b82f6",
  "Key Decisions": "#f59e0b",
  "Wins": "#10b981",
  "Blockers & Risks": "#ef4444",
  "default": "#9ca3af",
};

/* ═══ CheckItem (interactive) ═══ */
function CheckItem({ item, done, onToggle }) {
  return (
    <div
      onClick={onToggle}
      className={`group flex items-start gap-3 py-3 px-2 -mx-2 rounded-xl cursor-pointer select-none transition-all duration-200 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 ${done ? "opacity-40" : ""}`}
    >
      <div className={`mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300 ${done ? "bg-emerald-500 shadow-sm shadow-emerald-500/20 scale-105" : "border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 group-hover:border-slate-400 dark:group-hover:border-slate-500"}`}>
        {done && <Icon.Check size={11} color="white" />}
      </div>
      <div className="flex-1 min-w-0 transition-transform duration-200 group-hover:translate-x-1">
        <div className="flex items-center gap-2">
          <span className={`text-sm leading-snug transition-colors duration-200 ${done ? "line-through text-slate-400 dark:text-slate-500" : "text-slate-800 dark:text-slate-200 font-medium"}`}>{item.label}</span>
          {item.flag === "urgent" && !done && <span className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] flex-shrink-0" />}
          {item.flag === "due" && !done && <span className="w-1.5 h-1.5 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.5)] flex-shrink-0" />}
        </div>
        {item.detail && !done && <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mt-1">{item.detail}</p>}
      </div>
    </div>
  );
}

/* ═══ InfoItem (non-interactive) ═══ */
function InfoItem({ item }) {
  return (
    <div className="flex items-start gap-3 py-3 px-2 -mx-2 rounded-xl transition-colors duration-200 hover:bg-slate-100/30 dark:hover:bg-slate-800/30">
      {item.time ? (
        <span className="text-xs font-semibold text-slate-400 dark:text-slate-500 tabular-nums w-16 flex-shrink-0 pt-0.5 text-right">{item.time}</span>
      ) : (
        <span className="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600 flex-shrink-0 mt-2 ml-1" />
      )}
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className="text-sm font-medium text-slate-800 dark:text-slate-200">{item.label}</span>
          {item.note && <span className="text-[10px] uppercase tracking-wider text-slate-400 bg-slate-100 dark:bg-slate-800 dark:text-slate-400 px-1.5 py-0.5 rounded-md font-semibold">{item.note}</span>}
        </div>
        {item.detail && <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mt-1">{item.detail}</p>}
      </div>
    </div>
  );
}

/* ═══ Section ═══ */
function Section({ section, completed, onToggle, defaultCollapsed }) {
  const [collapsed, setCollapsed] = useState(defaultCollapsed);
  const isInfo = !!section.info;
  const doneCount = isInfo ? 0 : section.items.filter(i => completed[i.id]).length;
  const total = section.items.length;
  const tint = TINT[section.title] || TINT.default;

  return (
    <div className="mb-6 last:mb-0">
      <button onClick={() => setCollapsed(!collapsed)} className="flex items-center gap-2 mb-1.5 w-full text-left group">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={`text-slate-400 dark:text-slate-500 transition-transform duration-200 group-hover:text-slate-600 dark:group-hover:text-slate-300 ${collapsed ? "" : "rotate-90"}`}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0 shadow-sm" style={{ background: tint, opacity: 0.8 }} />
        <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 transition-colors group-hover:text-slate-700 dark:group-hover:text-slate-200">{section.title}</h3>
        {!isInfo && doneCount === total && total > 0 && <Icon.Check size={12} className="text-emerald-500 drop-shadow-sm" />}
        {!isInfo && doneCount > 0 && doneCount < total && <span className="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded-md">{doneCount}/{total}</span>}
      </button>
      
      <div className={`grid transition-all duration-300 ease-in-out ${collapsed ? "grid-rows-[0fr] opacity-0" : "grid-rows-[1fr] opacity-100"}`}>
        <div className="overflow-hidden">
          <div className="pl-1 pt-1 pb-1">
            {isInfo
              ? section.items.map(item => <InfoItem key={item.id} item={item} />)
              : section.items.map(item => (
                  <CheckItem key={item.id} item={item} done={!!completed[item.id]} onToggle={() => onToggle(item.id)} />
                ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ DigestCard ═══ */
function DigestCard({ digest, completed, onToggle, onDelete, onRestore, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const actionItems = digest.sections.filter(s => !s.info).flatMap(s => s.items);
  const total = actionItems.length;
  const doneCount = actionItems.filter(i => completed[i.id]).length;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

  return (
    <div className={`mb-6 p-5 sm:p-7 rounded-[2rem] border transition-all duration-300 
      ${open ? 'bg-white/60 dark:bg-slate-800/40 shadow-xl shadow-slate-200/40 dark:shadow-none border-slate-200/60 dark:border-slate-700/50 backdrop-blur-xl' 
             : 'bg-white/40 dark:bg-slate-800/20 shadow-sm border-slate-200/40 dark:border-slate-700/30 hover:bg-white/60 dark:hover:bg-slate-800/40 hover:shadow-md'}`}>
             
      <div className="flex items-center gap-2 mb-2">
        <button onClick={() => setOpen(!open)} className="flex items-center gap-3 group flex-1 text-left">
          <div className={`p-1.5 rounded-full bg-slate-100 dark:bg-slate-800 transition-transform duration-300 ${open ? "rotate-0" : "-rotate-90"}`}>
            <Icon.ChevronDown size={14} className="text-slate-500 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200 transition-colors" />
          </div>
          <div>
            <h2 className={`text-lg font-bold tracking-tight transition-colors ${onRestore ? "text-slate-400 dark:text-slate-500" : "text-slate-900 dark:text-slate-50"}`}>{digest.date}</h2>
            <div className="flex items-center gap-2 mt-0.5">
               <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">{digest.type}</span>
            </div>
          </div>
        </button>
        {total > 0 && !onRestore && (
          <div className="flex flex-col items-end gap-1 mr-2">
             <span className="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full">{doneCount}/{total}</span>
          </div>
        )}
        
        {/* Actions */}
        <div className="flex items-center">
          {onRestore && (
            <button onClick={() => onRestore(digest.id)} className="text-slate-400 hover:text-blue-500 transition-all p-2 rounded-xl hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center gap-1.5" title="Restore briefing">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              <span className="text-xs font-semibold">Restore</span>
            </button>
          )}
          {onDelete && (
            confirmDelete ? (
              <div className="flex items-center gap-1.5">
                <button onClick={() => { onDelete(digest.id); setConfirmDelete(false); }} className="text-xs font-bold text-red-500 hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-red-50 dark:bg-red-500/10 hover:bg-red-500">Archive</button>
                <button onClick={() => setConfirmDelete(false)} className="text-xs font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700">Cancel</button>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} className="text-slate-400 hover:text-red-500 transition-all p-2 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10" title="Archive briefing">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            )
          )}
        </div>
      </div>

      {open && (
        <div className="fade-in mt-4 pt-4 border-t border-slate-200/50 dark:border-slate-700/50">
          {digest.greeting && (
            <div className="flex items-start gap-4 mb-8 py-4 px-5 rounded-2xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-800/30">
              <div className="w-8 h-8 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                <span className="text-white text-sm font-bold">M</span>
              </div>
              <p className="text-sm text-slate-700 dark:text-slate-300 leading-relaxed font-medium">{digest.greeting}</p>
            </div>
          )}

          {total > 0 && (
            <div className="flex items-center gap-4 mb-8 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-2xl border border-slate-100 dark:border-slate-800">
              <div className="flex-1 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700 ease-out relative"
                  style={{ 
                    width: `${pct}%`, 
                    background: pct === 100 ? "#10b981" : pct > 0 ? "#3b82f6" : "transparent"
                  }}>
                    {pct === 100 && <div className="absolute inset-0 bg-white/20 animate-pulse"></div>}
                </div>
              </div>
              <span className={`text-xs font-bold tabular-nums w-10 text-right transition-colors ${pct === 100 ? "text-emerald-500 drop-shadow-[0_0_8px_rgba(16,185,129,0.4)]" : "text-slate-400"}`}>{pct}%</span>
            </div>
          )}

          <div className="space-y-2">
            {digest.sections.map((section, si) => (
              <Section key={si} section={section} completed={completed} onToggle={onToggle} defaultCollapsed={false} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ Clean up old storage keys from previous versions ═══ */
try { localStorage.removeItem("llf-completed"); localStorage.removeItem("llf-hidden"); } catch {}

/* ═══ State Persistence (Supabase) ═══ */
const SUPABASE_URL = "https://niqzkombzncxxihhulqq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcXprb21iem5jeHhpaGh1bHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI5NTgsImV4cCI6MjA4OTI2ODk1OH0.9DMbwxPi4yBkXG034sakwh6tnxt-AUcKkt_MER71qcg";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let writeQueue = null;
let remoteOk = true;

async function remoteRead() {
  try {
    const { data: item, error } = await supabase.from('app_state').select('data').eq('id', 1).single();
    if (error && error.code !== 'PGRST116') throw error;
    const data = item && item.data ? item.data : null;
    remoteOk = true;
    console.log("[state] remote read OK:", JSON.stringify(data));
    return data;
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote read FAILED:", e);
    return null;
  }
}

async function remoteWrite(state) {
  try {
    const { error } = await supabase.from('app_state').upsert({ id: 1, data: state });
    if (error) throw error;
    remoteOk = true;
    console.log("[state] remote write OK:", JSON.stringify(state));
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote write FAILED:", e);
  }
}

function debouncedWrite(state) {
  try { localStorage.setItem("llf-state", JSON.stringify(state)); } catch {}
  clearTimeout(writeQueue);
  writeQueue = setTimeout(() => remoteWrite(state), 800);
}

/* ═══ Reminder Box ═══ */
function ReminderBox({ reminders, onAdd, onRemove }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");

  const handleAdd = () => {
    const trimmed = text.trim();
    if (!trimmed) return;
    onAdd(trimmed);
    setText("");
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); }
  };

  return (
    <div className="mb-10">
      <button
        onClick={() => setOpen(!open)}
        className="flex items-center gap-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-colors group"
      >
        <div className="p-1.5 rounded-full bg-slate-200/50 dark:bg-slate-800 group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30 transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400 dark:text-slate-500 group-hover:text-blue-500 transition-colors"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        Add reminder for next briefing
        {reminders.length > 0 && (
          <span className="bg-blue-500 text-white shadow-sm shadow-blue-500/20 text-[10px] font-bold px-2 py-0.5 rounded-full">{reminders.length}</span>
        )}
      </button>

      <div className={`grid transition-all duration-300 ease-in-out ${open ? "grid-rows-[1fr] opacity-100 mt-4" : "grid-rows-[0fr] opacity-0"}`}>
        <div className="overflow-hidden">
          <div className="flex gap-2 mb-3">
            <input
              type="text"
              value={text}
              onChange={e => setText(e.target.value)}
              onKeyDown={handleKey}
              placeholder="e.g. Follow up with Hassan on escalation..."
              className="flex-1 px-4 py-2.5 text-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm rounded-xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all font-medium"
            />
            <button
              onClick={handleAdd}
              disabled={!text.trim()}
              className="px-5 py-2.5 text-sm font-bold rounded-xl transition-all bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 hover:bg-slate-800 dark:hover:bg-white disabled:bg-slate-100 disabled:text-slate-400 dark:disabled:bg-slate-800 dark:disabled:text-slate-600 shadow-sm disabled:shadow-none hover:scale-[1.02] active:scale-[0.98]"
            >
              Add
            </button>
          </div>

          {reminders.length > 0 && (
            <div className="space-y-2 mt-4">
              {reminders.map(r => (
                <div key={r.id} className="flex items-center gap-3 py-2.5 px-4 rounded-xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-800/30 group transition-all hover:bg-blue-50 dark:hover:bg-blue-900/20">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500 flex-shrink-0"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-300 flex-1">{r.text}</span>
                  <button onClick={() => onRemove(r.id)} className="text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10" title="Remove">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══ Main App ═══ */
function App() {
  const [digests, setDigests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [completed, setCompleted] = useState({});
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [hidden, setHidden] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [stateLoaded, setStateLoaded] = useState(false);
  const userActed = React.useRef(false); // only write after a real user action

  // Theme Management
  const [theme, setTheme] = useState(() => {
    if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    localStorage.setItem("theme", theme);
  }, [theme]);

  // Load digests + state on mount
  useEffect(() => {
    // Fetch digests.json
    fetch("digests.json?" + Date.now())
      .then(r => { if (!r.ok) throw new Error("Failed to load"); return r.json(); })
      .then(data => {
        const sorted = [...data].sort((a, b) => (b.isoDate || "").localeCompare(a.isoDate || ""));
        setDigests(sorted);
        setLoading(false);
      })
      .catch(e => { setError(e.message); setLoading(false); });

    // Load state: localStorage first (instant), then remote (authoritative)
    try {
      const local = JSON.parse(localStorage.getItem("llf-state") || "{}");
      if (local.completed && Object.keys(local.completed).length) setCompleted(local.completed);
      if (local.hidden && local.hidden.length) setHidden(local.hidden);
      if (local.reminders && local.reminders.length) setReminders(local.reminders);
    } catch {}

    remoteRead().then(state => {
      if (state && state.completed) setCompleted(state.completed);
      if (state && state.hidden) setHidden(state.hidden);
      if (state && state.reminders) setReminders(state.reminders);
      setStateLoaded(true);
    });
  }, []);

  // Persist state to remote — ONLY after a real user action (not on initial load)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedWrite({ completed, hidden, reminders });
  }, [completed, hidden, reminders, stateLoaded]);

  const toggle = useCallback((id) => {
    userActed.current = true;
    setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
  }, []);

  const deleteDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => [...prev, digestId]);
  }, []);

  const addReminder = useCallback((text) => {
    userActed.current = true;
    setReminders(prev => [...prev, { id: "rem-" + Date.now(), text, addedAt: new Date().toISOString() }]);
  }, []);

  const removeReminder = useCallback((remId) => {
    userActed.current = true;
    setReminders(prev => prev.filter(r => r.id !== remId));
  }, []);

  // Clock
  const [time, setTime] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(id); }, []);

  // Restore from archive
  const restoreDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => prev.filter(id => id !== digestId));
  }, []);

  // Filter & search
  const isArchiveView = typeFilter === "archived";

  const filtered = useMemo(() => {
    if (isArchiveView) {
      let list = digests.filter(d => hidden.includes(d.id));
      if (search.trim()) {
        const q = search.toLowerCase();
        list = list.filter(d =>
          d.date.toLowerCase().includes(q) ||
          (d.greeting || "").toLowerCase().includes(q) ||
          d.sections.some(s =>
            s.title.toLowerCase().includes(q) ||
            s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
          )
        );
      }
      return list;
    }
    let list = digests.filter(d => !hidden.includes(d.id));
    if (typeFilter !== "all") list = list.filter(d => d.type === typeFilter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d =>
        d.date.toLowerCase().includes(q) ||
        (d.greeting || "").toLowerCase().includes(q) ||
        d.sections.some(s =>
          s.title.toLowerCase().includes(q) ||
          s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
        )
      );
    }
    return list;
  }, [digests, typeFilter, search, hidden, isArchiveView]);

  // Unique types + archived tab
  const activeDigests = digests.filter(d => !hidden.includes(d.id));
  const types = useMemo(() => {
    const t = new Set(digests.filter(d => !hidden.includes(d.id)).map(d => d.type));
    const tabs = ["all", ...Array.from(t)];
    if (hidden.length > 0) tabs.push("archived");
    return tabs;
  }, [digests, hidden]);

  const greeting = (() => {
    const h = time.getHours();
    if (h < 12) return "Good morning";
    if (h < 18) return "Good afternoon";
    return "Good evening";
  })();

  const dateStr = time.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const timeStr = time.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  if (loading) {
    return (
      <div className="min-h-screen bg-[#f8fafc] dark:bg-[#0f172a] transition-colors duration-300">
        <div className="max-w-2xl mx-auto px-6 py-10">
          <div className="mb-12">
            <div className="flex items-center justify-between mb-4">
              <div className="h-8 bg-slate-200 dark:bg-slate-800 rounded-lg w-1/2 animate-pulse"></div>
              <div className="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-800 animate-pulse border-4 border-white dark:border-slate-800 shadow-sm"></div>
            </div>
            <div className="h-4 bg-slate-200 dark:bg-slate-800 rounded-md w-1/3 animate-pulse"></div>
          </div>
          
          <div className="space-y-6">
            {[1, 2, 3].map(i => (
              <div key={i} className="p-6 rounded-[2rem] bg-white/40 dark:bg-slate-800/20 shadow-sm border border-slate-200/50 dark:border-slate-700/30 animate-pulse">
                <div className="flex gap-4">
                  <div className="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
                  <div className="flex-1">
                    <div className="h-5 bg-slate-200 dark:bg-slate-700 rounded-md w-1/3 mb-3"></div>
                    <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded-md w-1/4 mb-8"></div>
                    <div className="space-y-3">
                       <div className="h-3 bg-slate-200 dark:bg-slate-700/50 rounded-md w-3/4"></div>
                       <div className="h-3 bg-slate-200 dark:bg-slate-700/50 rounded-md w-5/6"></div>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (error) {
    return (
      <div className="min-h-screen bg-[#f8fafc] dark:bg-[#0f172a] flex items-center justify-center p-6">
        <div className="text-center max-w-sm bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-700">
          <div className="w-12 h-12 rounded-full bg-red-100 dark:bg-red-500/20 text-red-500 flex items-center justify-center mx-auto mb-4">
             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <p className="text-lg text-slate-900 dark:text-slate-100 font-bold mb-2">Couldn&apos;t load briefings</p>
          <p className="text-sm text-slate-500 dark:text-slate-400">Make sure <code className="bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded-md font-mono text-xs">digests.json</code> is in the same folder as this page.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen">
      <div className="max-w-2xl mx-auto px-6 py-12 md:py-16 fade-in">

        {/* Header */}
        <div className="mb-12">
          <div className="flex items-center justify-between mb-2">
            <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white drop-shadow-sm">{greeting}, Jean 👋</h1>
            <div className="flex items-center gap-4">
              <button 
                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                className="p-2.5 rounded-full bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-400 hover:text-blue-500 dark:hover:text-amber-400 shadow-sm border border-slate-200 dark:border-slate-700 transition-all hover:scale-105"
                title="Toggle Theme"
              >
                {theme === 'dark' ? <Icon.Sun size={18} /> : <Icon.Moon size={18} />}
              </button>
              <img src="avatar.png" alt="" className="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover shadow-lg shadow-slate-200/50 dark:shadow-slate-900/50 border-[3px] border-white dark:border-slate-800 transition-transform hover:scale-105" onError={(e) => { e.target.style.display = 'none'; }} />
            </div>
          </div>
          <div className="flex items-center gap-2">
            <p className="text-sm font-medium text-slate-500 dark:text-slate-400 capitalize bg-slate-200/50 dark:bg-slate-800/50 px-3 py-1 rounded-full">{dateStr}</p>
            <span className="text-slate-300 dark:text-slate-600">&middot;</span>
            <p className="text-sm font-medium text-slate-500 dark:text-slate-400">Lisinski Law Firm</p>
            <span className="text-slate-300 dark:text-slate-600 hidden sm:inline">&middot;</span>
            <p className="text-sm font-semibold text-slate-400 dark:text-slate-500 tabular-nums hidden sm:inline">{timeStr}</p>
          </div>
        </div>

        {/* Reminders for next digest */}
        <ReminderBox reminders={reminders} onAdd={addReminder} onRemove={removeReminder} />

        {/* Search + filters */}
        <div className="mb-8 p-1">
          {/* Search */}
          <div className="relative mb-5 group">
            <div className="absolute left-4 top-1/2 -translate-y-1/2 p-1 rounded-full group-focus-within:bg-blue-50 dark:group-focus-within:bg-blue-900/30 transition-colors">
              <Icon.Search size={16} className="text-slate-400 group-focus-within:text-blue-500 transition-colors" />
            </div>
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search briefings..."
              className="w-full pl-12 pr-4 py-3 text-sm font-medium bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-sm rounded-2xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all"
            />
          </div>

          {/* Type filter */}
          <div className="flex gap-2 flex-wrap">
            {types.map(t => {
              const count = t === "all" ? activeDigests.length
                : t === "archived" ? hidden.length
                : activeDigests.filter(d => d.type === t).length;
              return (
                <button
                  key={t}
                  onClick={() => setTypeFilter(t)}
                  className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all capitalize whitespace-nowrap shadow-sm active:scale-95 ${
                    typeFilter === t
                      ? (t === "archived" ? "bg-slate-700 text-white dark:bg-slate-200 dark:text-slate-900" : "bg-slate-900 text-white dark:bg-white dark:text-slate-900")
                      : (t === "archived" ? "bg-white dark:bg-slate-800 text-slate-500 hover:text-slate-700 border border-slate-200 dark:border-slate-700 dark:hover:text-slate-300" : "bg-white dark:bg-slate-800 text-slate-600 hover:text-slate-900 border border-slate-200 dark:border-slate-700 dark:hover:text-slate-200")
                  }`}
                >
                  {t === "all" ? `All (${count})` : `${t} (${count})`}
                </button>
              );
            })}
          </div>
        </div>

        {/* Digest list */}
        {filtered.length === 0 ? (
          <div className="text-center py-20 px-6 rounded-[2rem] border border-dashed border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-800/30 backdrop-blur-md">
            <div className="w-14 h-14 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
              <Icon.Search size={24} className="text-slate-400 dark:text-slate-500" />
            </div>
            <p className="text-base font-bold text-slate-700 dark:text-slate-300 mb-1">
              {isArchiveView ? "No archived briefings" : "No briefings found"}
            </p>
            <p className="text-sm font-medium text-slate-500 dark:text-slate-500">Try adjusting your filters or search terms.</p>
          </div>
        ) : (
          <div className="space-y-6 relative">
            {filtered.map((d, i) => (
              <DigestCard
                key={d.id}
                digest={d}
                completed={completed}
                onToggle={toggle}
                onDelete={isArchiveView ? null : deleteDigest}
                onRestore={isArchiveView ? restoreDigest : null}
                defaultOpen={isArchiveView ? false : i === 0}
              />
            ))}
          </div>
        )}

        {/* Footer */}
        <div className="mt-16 pt-8 border-t border-slate-200/60 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-6 h-6 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center">
              <span className="text-white text-xs font-bold" style={{ fontSize: "10px" }}>M</span>
            </div>
            <span className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Madison &middot; LLF Automation</span>
          </div>
          <div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full">
            <span className="text-xs font-bold text-slate-500 dark:text-slate-400">{digests.length - hidden.length} active briefing{(digests.length - hidden.length) !== 1 ? "s" : ""}</span>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
